name: firstcc
description: 大学生课程表+待办融合管理APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^14.2.0

  # 数据库
  sqflite: ^2.3.3
  sqflite_common_ffi_web: ^0.4.5+2
  sqflite_common_ffi: ^2.3.4+3
  path: ^1.9.0

  # Web JS 交互
  # 本地通知
  flutter_local_notifications: ^17.2.2

  # 日期处理
  intl: ^0.19.0
  timezone: ^0.9.4

  # 简单 KV 存储
  shared_preferences: ^2.3.2

  # 唯一 ID
  uuid: ^4.4.2

  # 滑动操作
  flutter_slidable: ^3.1.1

  # 文件选择
  file_picker: ^8.0.0

  # HTML 解析
  html: ^0.15.4

  # 平台图标
  # 离线语音识别
  sherpa_onnx: ^1.12.35
  # 录音
  record: ^6.1.0
  # HTTP 下载模型
  http: ^1.2.2
  # 解压模型包
  archive: ^4.0.2
  # 文件路径
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/gbk_table.txt
