name: Build Flutter Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 【终极可靠方案】手工下载 Flutter SDK，并确认安装
      - name: Setup Flutter
        run: |
          FLUTTER_VERSION="3.24.3"
          echo "正在下载 Flutter SDK 版本 $FLUTTER_VERSION..."
          # 下载并解压到当前目录下的 flutter 文件夹
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
          tar xf flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
          echo "Flutter SDK 下载并解压完毕。"

      # 【关键】后续所有步骤，都直接用 ${GITHUB_WORKSPACE}/flutter/bin/flutter 执行
      - name: Install dependencies
        run: ${GITHUB_WORKSPACE}/flutter/bin/flutter pub get

      # 强制先跑一遍 doctor，防止因为首次安装需要接受协议导致后续失败
      - name: Flutter Doctor
        run: |
          ${GITHUB_WORKSPACE}/flutter/bin/flutter doctor -v

      - name: Build APK
        run: ${GITHUB_WORKSPACE}/flutter/bin/flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
