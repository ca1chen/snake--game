name: Build Flutter Release APK

# 触发条件：推送到 main 或 master 分支时，或手动点击运行
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (Flutter 安卓打包必须)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 设置 Flutter 环境 (使用最新 Action v3)
      - name: Setup Flutter
      uses: subosito/flutter-action@v3
      with:
    # 建议显式指定一个稳定版本的号，避免自动获取导致报错
    # 你可以换成最新版本，例如 3.24.3, 3.22.3 等
        flutter-version: '3.24.3'
        channel: 'stable'

      # 4. 安装依赖包
      - name: Install dependencies
        run: flutter pub get

      # 5. 编译打包 Release APK (注意：这里未配置签名，是 debug 签名包)
      - name: Build APK
        run: flutter build apk --release

      # 6. 上传生成的 APK 文件到 GitHub Actions 页面供下载
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
