name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  build-ios:
    name: Build iOS (FirstCC)
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: 无签名编译（验证代码）
        run: flutter build ios --release --no-codesign

      - name: 上传 .app 产物
        uses: actions/upload-artifact@v4
        with:
          name: firstcc-ios-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

  # ========== 已签名的 IPA（需配置 Secrets） ==========
  build-ipa:
    name: Build Signed IPA
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' # 仅手动触发
    needs: build-ios

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: 导入签名证书（可选）
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时 keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 导入证书
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 导入 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          # 设为默认 keychain
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

      - name: 构建 IPA
        run: flutter build ipa --release --export-method=development

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: firstcc-ios-ipa
          path: build/ios/ipa/firstcc.ipa
          retention-days: 7
