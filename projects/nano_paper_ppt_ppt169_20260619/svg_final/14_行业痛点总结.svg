<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#080E18" />
  <rect x="0" y="0" width="1280" height="4" fill="#F97316" />
  <text x="80" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#0EA5E9">纳米产业核心矛盾</text>
  <rect x="80" y="70" width="1120" height="1" fill="#1E293B" />

  
  <path fill="#060E1A" d="M86,100 H1194 A6,6 0 0 1 1200,106 V174 A6,6 0 0 1 1194,180 H86 A6,6 0 0 1 80,174 V106 A6,6 0 0 1 86,100 Z" />
  <text x="640" y="150" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#080E18" text-anchor="middle">"单一技术维度创新已难以突破行业瓶颈"</text>

  
  <path fill="#111827" d="M86,210 H614 A6,6 0 0 1 620,216 V404 A6,6 0 0 1 614,410 H86 A6,6 0 0 1 80,404 V216 A6,6 0 0 1 86,210 Z" />
  <path fill="#0EA5E9" d="M86,210 H614 A6,6 0 0 1 620,216 V254 A6,6 0 0 1 614,260 H86 A6,6 0 0 1 80,254 V216 A6,6 0 0 1 86,210 Z" />
  <rect x="80" y="240" width="540" height="20" fill="#0EA5E9" />
  <text x="350" y="243" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#080E18" text-anchor="middle">科学工程维度</text>
  <text x="110" y="295" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 微观完美与宏观脆弱的矛盾：实验室表现惊艳，真实工况下衰减</text>
  <text x="110" y="325" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 长期稳定性与高性价比量产是必须跨越的核心鸿沟</text>
  <text x="110" y="355" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 材料-结构-驱动协同设计体系尚未完善</text>
  <text x="110" y="385" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 多场耦合、尺度适配等基础科学问题未解</text>

  <path fill="#111827" d="M666,210 H1194 A6,6 0 0 1 1200,216 V404 A6,6 0 0 1 1194,410 H666 A6,6 0 0 1 660,404 V216 A6,6 0 0 1 666,210 Z" />
  <path fill="#22D3EE" d="M666,210 H1194 A6,6 0 0 1 1200,216 V254 A6,6 0 0 1 1194,260 H666 A6,6 0 0 1 660,254 V216 A6,6 0 0 1 666,210 Z" />
  <rect x="660" y="240" width="540" height="20" fill="#22D3EE" />
  <text x="930" y="243" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#080E18" text-anchor="middle">生态健康维度</text>
  <text x="690" y="295" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 纳米毒理学数据匮乏：自然循环/食物链/长期滞留机制不明</text>
  <text x="690" y="325" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 新型环境污染：纳米产品普及对微生物生态系统不可逆破坏</text>
  <text x="690" y="355" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 纳米银等杀菌材料进入水体后破坏生态平衡</text>
  <text x="690" y="385" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 极微小颗粒可穿透皮肤毛囊进入人体循环系统</text>

  <path fill="#111827" d="M86,440 H614 A6,6 0 0 1 620,446 V634 A6,6 0 0 1 614,640 H86 A6,6 0 0 1 80,634 V446 A6,6 0 0 1 86,440 Z" />
  <path fill="#F97316" d="M86,440 H614 A6,6 0 0 1 620,446 V484 A6,6 0 0 1 614,490 H86 A6,6 0 0 1 80,484 V446 A6,6 0 0 1 86,440 Z" />
  <rect x="80" y="470" width="540" height="20" fill="#F97316" />
  <text x="350" y="473" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#080E18" text-anchor="middle">社会伦理维度</text>
  <text x="110" y="525" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 技术"平权"：高端纳米医疗可能固化阶级鸿沟</text>
  <text x="110" y="555" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• "超人类" vs "自然人"的伦理边界模糊</text>
  <text x="110" y="585" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 安全/武器化风险：纳米技术可制造隐蔽性极强的生化武器</text>
  <text x="110" y="615" font-family="Microsoft YaHei" font-size="13" fill="#CCD6E0">• 隐私风险：纳米传感器网络的大规模监控能力</text>

  
  <path fill="#060E1A" d="M666,440 H1194 A6,6 0 0 1 1200,446 V634 A6,6 0 0 1 1194,640 H666 A6,6 0 0 1 660,634 V446 A6,6 0 0 1 666,440 Z" />
  <text x="930" y="485" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#080E18" text-anchor="middle">发展路径建议</text>
  <text x="690" y="530" font-family="Microsoft YaHei" font-size="15" fill="#080E18">❶ 同步推进智能纳米安全监管</text>
  <text x="690" y="560" font-family="Microsoft YaHei" font-size="15" fill="#080E18">❷ 加强纳米毒理学基础研究</text>
  <text x="690" y="590" font-family="Microsoft YaHei" font-size="15" fill="#080E18">❸ 出台全球统一的纳米分级</text>
  <text x="705" y="615" font-family="Microsoft YaHei" font-size="15" fill="#080E18">管控标准</text>

  <text x="1200" y="700" font-family="Microsoft YaHei" font-size="11" fill="#64748B" text-anchor="end">14</text>
  <rect x="0" y="718" width="1280" height="2" fill="#1E293B" />
</svg>