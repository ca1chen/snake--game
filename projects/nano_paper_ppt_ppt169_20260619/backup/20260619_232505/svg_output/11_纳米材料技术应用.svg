<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#003D7C"/>
  <text x="80" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#003D7C">纳米材料技术应用</text>
  <rect x="80" y="70" width="1120" height="1" fill="#E0E4E8"/>

  <!-- 4 application cards -->
  <rect x="80" y="100" width="260" height="220" rx="6" fill="#F4F6F9"/>
  <rect x="80" y="100" width="260" height="4" fill="#003D7C"/>
  <text x="210" y="140" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#003D7C" text-anchor="middle">结构增强</text>
  <text x="105" y="175" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">提升柔性构件抗疲劳</text>
  <text x="105" y="198" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">性能与形变稳定性</text>
  <text x="105" y="230" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">轻质高强纳米复合材</text>
  <text x="105" y="253" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">料超越传统材料极限</text>
  <rect x="105" y="275" width="210" height="30" rx="4" fill="#003D7C" opacity="0.1"/>
  <text x="210" y="295" font-family="Microsoft YaHei" font-size="11" fill="#003D7C" text-anchor="middle">高端制造·核心器件</text>

  <rect x="360" y="100" width="260" height="220" rx="6" fill="#F4F6F9"/>
  <rect x="360" y="100" width="260" height="4" fill="#0066B3"/>
  <text x="490" y="140" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#0066B3" text-anchor="middle">功能驱动</text>
  <text x="385" y="175" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">纳米压电、MXene材料</text>
  <text x="385" y="198" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">实现驱动传感一体化</text>
  <text x="385" y="230" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">柔性智能材料可实现</text>
  <text x="385" y="253" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">驱动/感知/操作一体</text>
  <rect x="385" y="275" width="210" height="30" rx="4" fill="#0066B3" opacity="0.1"/>
  <text x="490" y="295" font-family="Microsoft YaHei" font-size="11" fill="#0066B3" text-anchor="middle">自适应·智能化作业</text>

  <rect x="640" y="100" width="260" height="220" rx="6" fill="#F4F6F9"/>
  <rect x="640" y="100" width="260" height="4" fill="#003D7C"/>
  <text x="770" y="140" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#003D7C" text-anchor="middle">界面改性</text>
  <text x="665" y="175" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">优化涂层工艺降低</text>
  <text x="665" y="198" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">微尺度摩擦磨损</text>
  <text x="665" y="230" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">功能性纳米涂层</text>
  <text x="665" y="253" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">提升表面特性与生物相容性</text>
  <rect x="665" y="275" width="210" height="30" rx="4" fill="#003D7C" opacity="0.1"/>
  <text x="770" y="295" font-family="Microsoft YaHei" font-size="11" fill="#003D7C" text-anchor="middle">表面工程·生物医学</text>

  <rect x="920" y="100" width="260" height="220" rx="6" fill="#F4F6F9"/>
  <rect x="920" y="100" width="260" height="4" fill="#0066B3"/>
  <text x="1050" y="140" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#0066B3" text-anchor="middle">精准传感</text>
  <text x="945" y="175" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">多模态感知融合</text>
  <text x="945" y="198" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">力/电/磁/热多功能</text>
  <text x="945" y="230" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">实现驱动-感知-操作</text>
  <text x="945" y="253" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">一体化闭环控制</text>
  <rect x="945" y="275" width="210" height="30" rx="4" fill="#0066B3" opacity="0.1"/>
  <text x="1050" y="295" font-family="Microsoft YaHei" font-size="11" fill="#0066B3" text-anchor="middle">智能传感·闭环控制</text>

  <!-- Bottom: 挑战与瓶颈 -->
  <rect x="80" y="350" width="1120" height="180" rx="6" fill="#F4F6F9"/>
  <text x="110" y="390" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#003D7C">技术瓶颈与挑战</text>
  <rect x="110" y="410" width="515" height="50" rx="4" fill="#FFFFFF"/>
  <text x="130" y="435" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">高端纳米薄膜制备工艺、复杂异形结构成型精度不足</text>
  <text x="130" y="453" font-family="Microsoft YaHei" font-size="12" fill="#666E75">→ 制约规模化应用</text>
  <rect x="655" y="410" width="515" height="50" rx="4" fill="#FFFFFF"/>
  <text x="675" y="435" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">极端工况下材料性能衰减明显，多材料界面结合强度低</text>
  <text x="675" y="453" font-family="Microsoft YaHei" font-size="12" fill="#666E75">→ 影响长期服役可靠性</text>
  <rect x="110" y="475" width="515" height="45" rx="4" fill="#FFF3E0"/>
  <text x="130" y="502" font-family="Microsoft YaHei" font-size="13" fill="#D4380D">材料-结构-驱动协同设计体系尚未完善，无法充分发挥纳米材料优势</text>
  <rect x="655" y="475" width="515" height="45" rx="4" fill="#FFF3E0"/>
  <text x="675" y="502" font-family="Microsoft YaHei" font-size="13" fill="#D4380D">材料成型一致性差，性能易受微环境干扰</text>

  <!-- 对比 -->
  <rect x="80" y="555" width="540" height="105" rx="6" fill="#F4F6F9"/>
  <text x="350" y="585" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#003D7C" text-anchor="middle">国外</text>
  <text x="110" y="615" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">高端定制化技术优势显著，国防/航空航天领域极限性能领先</text>
  <text x="110" y="640" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">基础材料数据库完善，多尺度仿真工具链成熟</text>
  <rect x="660" y="555" width="540" height="105" rx="6" fill="#F4F6F9"/>
  <text x="930" y="585" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#0066B3" text-anchor="middle">国内</text>
  <text x="690" y="615" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">工程化、产业化落地优势突出，成本控制与规模化能力领先</text>
  <text x="690" y="640" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">应用驱动型创新活跃，场景迭代速度快</text>

  <text x="1200" y="700" font-family="Microsoft YaHei" font-size="11" fill="#666E75" text-anchor="end">11</text>
  <rect x="0" y="718" width="1280" height="2" fill="#E0E4E8"/>
</svg>
