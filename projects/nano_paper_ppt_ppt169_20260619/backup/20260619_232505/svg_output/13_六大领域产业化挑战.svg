<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#D4380D"/>
  <text x="80" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#003D7C">六大领域产业化挑战</text>
  <rect x="80" y="70" width="1120" height="1" fill="#E0E4E8"/>

  <!-- Row 1 -->
  <rect x="80" y="95" width="350" height="130" rx="6" fill="#F4F6F9"/>
  <rect x="80" y="95" width="6" height="130" rx="3" fill="#D4380D"/>
  <text x="110" y="125" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#D4380D">纳米复合材料</text>
  <text x="110" y="150" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">分散困难→团聚→强度不升反降</text>
  <text x="110" y="172" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">回收难题→降级使用或焚烧</text>

  <rect x="465" y="95" width="350" height="130" rx="6" fill="#F4F6F9"/>
  <rect x="465" y="95" width="6" height="130" rx="3" fill="#D4380D"/>
  <text x="495" y="125" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#D4380D">半导体制造</text>
  <text x="495" y="150" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">量子隧穿→芯片漏电发热</text>
  <text x="495" y="172" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">纳米级灰尘→整片晶圆报废</text>

  <rect x="850" y="95" width="350" height="130" rx="6" fill="#F4F6F9"/>
  <rect x="850" y="95" width="6" height="130" rx="3" fill="#D4380D"/>
  <text x="880" y="125" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#D4380D">纳米涂层</text>
  <text x="880" y="150" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">耐久性差→物理强度先天不足</text>
  <text x="880" y="172" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">维护成本高→1-2年局部失效</text>

  <!-- Row 2 -->
  <rect x="80" y="250" width="350" height="130" rx="6" fill="#F4F6F9"/>
  <rect x="80" y="250" width="6" height="130" rx="3" fill="#0066B3"/>
  <text x="110" y="280" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#0066B3">纺织行业</text>
  <text x="110" y="305" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">结合不牢→纳米颗粒"粘"而不"长"</text>
  <text x="110" y="327" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">洗涤流失+环境风险+健康隐患</text>

  <rect x="465" y="250" width="350" height="130" rx="6" fill="#F4F6F9"/>
  <rect x="465" y="250" width="6" height="130" rx="3" fill="#0066B3"/>
  <text x="495" y="280" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#0066B3">切削刀具</text>
  <text x="495" y="305" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">界面剥离→涂层/基体剪切应力</text>
  <text x="495" y="327" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">高温失效→1000°C再结晶/退火</text>

  <rect x="850" y="250" width="350" height="130" rx="6" fill="#F4F6F9"/>
  <rect x="850" y="250" width="6" height="130" rx="3" fill="#0066B3"/>
  <text x="880" y="280" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#0066B3">生物医疗</text>
  <text x="880" y="305" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">动力供应→电池无法缩放至纳米</text>
  <text x="880" y="327" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">免疫清除+靶向识别+通信盲区</text>

  <!-- Summary box -->
  <rect x="80" y="420" width="1120" height="100" rx="6" fill="#0B1D3A"/>
  <text x="120" y="460" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#FFFFFF">共性根源</text>
  <text x="120" y="495" font-family="Microsoft YaHei" font-size="14" fill="#8899BB">纳米级尺度下的物理极限与工程成本双重约束 | 微观性能优异但宏观环境适配困难 | 从"实验室可行"到"工厂可靠"的转化鸿沟</text>

  <!-- 3 pain points -->
  <rect x="80" y="545" width="350" height="110" rx="6" fill="#FFF3E0"/>
  <rect x="80" y="545" width="350" height="4" fill="#D4380D"/>
  <text x="255" y="580" font-family="Microsoft YaHei" font-size="15" font-weight="bold" fill="#D4380D" text-anchor="middle">量产成本高</text>
  <text x="110" y="610" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">高纯度原料+昂贵真空/精密设备</text>
  <text x="110" y="635" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">质控只能抽检，残次品浪费巨大</text>
  <rect x="465" y="545" width="350" height="110" rx="6" fill="#FFF3E0"/>
  <rect x="465" y="545" width="350" height="4" fill="#D4380D"/>
  <text x="640" y="580" font-family="Microsoft YaHei" font-size="15" font-weight="bold" fill="#D4380D" text-anchor="middle">微→宏迁移难</text>
  <text x="495" y="610" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">纳米尺度完美特性在宏观环境中</text>
  <text x="495" y="635" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">极易失效，长期稳定性难以保证</text>
  <rect x="850" y="545" width="350" height="110" rx="6" fill="#FFF3E0"/>
  <rect x="850" y="545" width="350" height="4" fill="#D4380D"/>
  <text x="1025" y="580" font-family="Microsoft YaHei" font-size="15" font-weight="bold" fill="#D4380D" text-anchor="middle">检测极其困难</text>
  <text x="880" y="610" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">产线高吞吐率下无法实时检测</text>
  <text x="880" y="635" font-family="Microsoft YaHei" font-size="12" fill="#1A1A1A">几纳米厚的涂层均匀性</text>

  <text x="1200" y="700" font-family="Microsoft YaHei" font-size="11" fill="#666E75" text-anchor="end">13</text>
  <rect x="0" y="718" width="1280" height="2" fill="#E0E4E8"/>
</svg>
