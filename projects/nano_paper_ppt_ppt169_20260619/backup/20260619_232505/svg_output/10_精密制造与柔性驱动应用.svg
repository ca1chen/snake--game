<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#003D7C"/>
  <text x="80" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#003D7C">精密制造与柔性驱动应用</text>
  <rect x="80" y="70" width="1120" height="1" fill="#E0E4E8"/>

  <!-- Left: 机械微纳加工 -->
  <rect x="80" y="95" width="550" height="560" rx="6" fill="#F4F6F9"/>
  <rect x="80" y="95" width="550" height="40" rx="6" fill="#003D7C"/>
  <rect x="80" y="115" width="550" height="20" fill="#003D7C"/>
  <text x="355" y="120" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">机械微纳加工领域</text>
  <text x="105" y="170" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#003D7C">探针纳米通道刻划仿真</text>
  <text x="105" y="195" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 分子动力学仿真实现探针与工件原子交互可视化</text>
  <text x="105" y="220" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 多尺度耦合仿真兼顾微观原子变形与宏观应力场</text>
  <rect x="105" y="245" width="500" height="1" fill="#E0E4E8"/>
  <text x="105" y="275" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#003D7C">微纳加工试验验证</text>
  <text x="105" y="300" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 国外：试验体系完备，率先实现单原子层极限刻划</text>
  <text x="105" y="325" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 国内：聚焦工程痛点，优化工艺参数组合</text>
  <rect x="105" y="350" width="500" height="1" fill="#E0E4E8"/>
  <text x="105" y="380" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#003D7C">装配检测系统集成</text>
  <text x="105" y="405" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 多自由度柔性执行机构，运动分辨率达纳米级</text>
  <text x="105" y="430" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 攻克高精度微驱动、微力传感、姿态调控核心技术</text>
  <rect x="105" y="460" width="500" height="1" fill="#E0E4E8"/>
  <text x="105" y="490" font-family="Microsoft YaHei" font-size="13" fill="#D4380D">现存问题：仿真基于理想工况假设，与工程实际偏差大</text>
  <text x="105" y="515" font-family="Microsoft YaHei" font-size="13" fill="#D4380D">行业痛点：试验数据标准化程度低，统一工艺标准缺失</text>
  <text x="105" y="545" font-family="Microsoft YaHei" font-size="13" fill="#D4380D">核心短板：高端传感芯片、探针部件部分依赖进口</text>

  <!-- Right: 柔性精密驱动 -->
  <rect x="660" y="95" width="540" height="560" rx="6" fill="#F4F6F9"/>
  <rect x="660" y="95" width="540" height="40" rx="6" fill="#0066B3"/>
  <rect x="660" y="115" width="540" height="20" fill="#0066B3"/>
  <text x="930" y="120" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">柔性机构与精密驱动领域</text>
  <text x="685" y="170" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#0066B3">仿真技术突破</text>
  <text x="685" y="195" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 攻克几何、材料、接触非线性仿真难题</text>
  <text x="685" y="220" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 引入加工残余应力、装配误差、环境扰动等干扰因素</text>
  <text x="685" y="250" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 构建"力-电-热-结构"协同仿真体系</text>
  <rect x="685" y="275" width="500" height="1" fill="#E0E4E8"/>
  <text x="685" y="305" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#0066B3">系统结构开发</text>
  <text x="685" y="330" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 从单自由度柔性铰链迭代至多自由度并联平台</text>
  <text x="685" y="355" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 自主研发复合型柔性铰链、对称式柔性导向机构</text>
  <rect x="685" y="380" width="500" height="1" fill="#E0E4E8"/>
  <text x="685" y="410" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#0066B3">精度指标体系</text>
  <text x="685" y="440" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 运动行程：毫米级 → 纳米级</text>
  <text x="685" y="465" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 定位精度：纳米级 | 力控精度：微牛顿级</text>
  <rect x="685" y="490" width="500" height="1" fill="#E0E4E8"/>
  <text x="685" y="520" font-family="Microsoft YaHei" font-size="13" fill="#D4380D">现存问题：高端核心部件国产化稳定性欠缺</text>
  <text x="685" y="545" font-family="Microsoft YaHei" font-size="13" fill="#D4380D">技术难点：多自由度耦合驱动误差难以消除</text>

  <text x="1200" y="700" font-family="Microsoft YaHei" font-size="11" fill="#666E75" text-anchor="end">10</text>
  <rect x="0" y="718" width="1280" height="2" fill="#E0E4E8"/>
</svg>
