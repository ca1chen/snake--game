<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="4" fill="#D4380D"/>
  <text x="80" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#003D7C">纳米产业核心矛盾</text>
  <rect x="80" y="70" width="1120" height="1" fill="#E0E4E8"/>

  <!-- Big quote -->
  <rect x="80" y="100" width="1120" height="80" rx="6" fill="#0B1D3A"/>
  <text x="640" y="150" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">"单一技术维度创新已难以突破行业瓶颈"</text>

  <!-- 4 challenges -->
  <rect x="80" y="210" width="540" height="200" rx="6" fill="#F4F6F9"/>
  <rect x="80" y="210" width="540" height="50" rx="6" fill="#003D7C"/>
  <rect x="80" y="240" width="540" height="20" fill="#003D7C"/>
  <text x="350" y="243" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">科学工程维度</text>
  <text x="110" y="295" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 微观完美与宏观脆弱的矛盾：实验室表现惊艳，真实工况下衰减</text>
  <text x="110" y="325" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 长期稳定性与高性价比量产是必须跨越的核心鸿沟</text>
  <text x="110" y="355" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 材料-结构-驱动协同设计体系尚未完善</text>
  <text x="110" y="385" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 多场耦合、尺度适配等基础科学问题未解</text>

  <rect x="660" y="210" width="540" height="200" rx="6" fill="#F4F6F9"/>
  <rect x="660" y="210" width="540" height="50" rx="6" fill="#0066B3"/>
  <rect x="660" y="240" width="540" height="20" fill="#0066B3"/>
  <text x="930" y="243" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">生态健康维度</text>
  <text x="690" y="295" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 纳米毒理学数据匮乏：自然循环/食物链/长期滞留机制不明</text>
  <text x="690" y="325" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 新型环境污染：纳米产品普及对微生物生态系统不可逆破坏</text>
  <text x="690" y="355" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 纳米银等杀菌材料进入水体后破坏生态平衡</text>
  <text x="690" y="385" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 极微小颗粒可穿透皮肤毛囊进入人体循环系统</text>

  <rect x="80" y="440" width="540" height="200" rx="6" fill="#F4F6F9"/>
  <rect x="80" y="440" width="540" height="50" rx="6" fill="#D4380D"/>
  <rect x="80" y="470" width="540" height="20" fill="#D4380D"/>
  <text x="350" y="473" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">社会伦理维度</text>
  <text x="110" y="525" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 技术"平权"：高端纳米医疗可能固化阶级鸿沟</text>
  <text x="110" y="555" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• "超人类" vs "自然人"的伦理边界模糊</text>
  <text x="110" y="585" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 安全/武器化风险：纳米技术可制造隐蔽性极强的生化武器</text>
  <text x="110" y="615" font-family="Microsoft YaHei" font-size="13" fill="#1A1A1A">• 隐私风险：纳米传感器网络的大规模监控能力</text>

  <!-- 发展路径 -->
  <rect x="660" y="440" width="540" height="200" rx="6" fill="#0B1D3A"/>
  <text x="930" y="485" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">发展路径建议</text>
  <text x="690" y="530" font-family="Microsoft YaHei" font-size="15" fill="#FFFFFF">❶ 同步推进智能纳米安全监管</text>
  <text x="690" y="560" font-family="Microsoft YaHei" font-size="15" fill="#FFFFFF">❷ 加强纳米毒理学基础研究</text>
  <text x="690" y="590" font-family="Microsoft YaHei" font-size="15" fill="#FFFFFF">❸ 出台全球统一的纳米分级</text>
  <text x="705" y="615" font-family="Microsoft YaHei" font-size="15" fill="#FFFFFF">管控标准</text>

  <text x="1200" y="700" font-family="Microsoft YaHei" font-size="11" fill="#666E75" text-anchor="end">14</text>
  <rect x="0" y="718" width="1280" height="2" fill="#E0E4E8"/>
</svg>
