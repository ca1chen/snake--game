  <text x="725" y="355" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">量子隧穿效应导致芯片严重漏电和发热</text>
  <path fill="#1E1408" d="M684,415 H1176 A4,4 0 0 1 1180,419 V501 A4,4 0 0 1 1176,505 H684 A4,4 0 0 1 680,501 V419 A4,4 0 0 1 684,415 Z" />
  <circle cx="705" cy="440" r="5" fill="#F59E0B" />
  <text x="725" y="435" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">设备局限</text>
  <text x="725" y="460" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">ASML极紫外光刻机售价数亿美元，极度耗电</text>
  <path fill="#1E1408" d="M684,520 H1176 A4,4 0 0 1 1180,524 V606 A4,4 0 0 1 1176,610 H684 A4,4 0 0 1 680,606 V524 A4,4 0 0 1 684,520 Z" />
  <circle cx="705" cy="545" r="5" fill="#F59E0B" />
  <text x="725" y="540" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">良率挑战</text>
  <text x="725" y="565" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">微纳米级灰尘即可导致整片晶圆报废</text>

  
  <text x="640" y="700" font-family="Microsoft YaHei" font-size="12" fill="#8899AA" text-anchor="middle">两大领域均面临：纳米级尺度下的物理极限与工程成本双重约束</text>
  <text x="1220" y="700" font-family="Microsoft YaHei" font-size="11" fill="#8899AA" text-anchor="end">11</text>
