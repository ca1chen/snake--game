<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0E17" />
  <rect x="0" y="0" width="1280" height="3" fill="#3B82F6" />
  <text x="60" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#FFFFFF">机械加工与医疗领域挑战</text>
  <rect x="60" y="70" width="1160" height="1" fill="#1E293B" />

  
  <path fill="#131926" d="M66,90 H614 A6,6 0 0 1 620,96 V384 A6,6 0 0 1 614,390 H66 A6,6 0 0 1 60,384 V96 A6,6 0 0 1 66,90 Z" />
  <text x="340" y="130" font-family="Microsoft YaHei" font-size="19" font-weight="bold" fill="#3B82F6" text-anchor="middle">机械加工刀具</text>
  <path fill="#1E3A5F" d="M84,160 H576 A4,4 0 0 1 580,164 V246 A4,4 0 0 1 576,250 H84 A4,4 0 0 1 80,246 V164 A4,4 0 0 1 84,160 Z" />
  <circle cx="110" cy="190" r="5" fill="#F59E0B" />
  <text x="130" y="185" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">界面剥离</text>
  <text x="130" y="210" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">纳米涂层与硬质合金刀基体交界处产生巨大剪切应力</text>
  <path fill="#1E3A5F" d="M84,270 H576 A4,4 0 0 1 580,274 V356 A4,4 0 0 1 576,360 H84 A4,4 0 0 1 80,356 V274 A4,4 0 0 1 84,270 Z" />
  <circle cx="110" cy="300" r="5" fill="#F59E0B" />
  <text x="130" y="295" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">高温失效</text>
  <text x="130" y="320" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">切削温度突破1000°C时，纳米结构发生再结晶或退火</text>
  <image href="../images/image126.png" x="100" y="380" width="200" height="80" preserveAspectRatio="xMidYMid slice" />
  <image href="../images/image128.png" x="320" y="380" width="220" height="80" preserveAspectRatio="xMidYMid slice" />

  
  <path fill="#131926" d="M666,90 H1214 A6,6 0 0 1 1220,96 V664 A6,6 0 0 1 1214,670 H666 A6,6 0 0 1 660,664 V96 A6,6 0 0 1 666,90 Z" />
  <text x="940" y="130" font-family="Microsoft YaHei" font-size="19" font-weight="bold" fill="#3B82F6" text-anchor="middle">医疗领域纳米机器人核心问题</text>
  <path fill="#1E1408" d="M684,160 H1176 A4,4 0 0 1 1180,164 V246 A4,4 0 0 1 1176,250 H684 A4,4 0 0 1 680,246 V164 A4,4 0 0 1 684,160 Z" />
  <circle cx="710" cy="188" r="5" fill="#F59E0B" />
  <text x="730" y="183" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">动力供应</text>
  <text x="730" y="208" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">传统电池无法缩放至纳米体积，外部驱动信号在深层组织衰减</text>
  <path fill="#1E1408" d="M684,265 H1176 A4,4 0 0 1 1180,269 V351 A4,4 0 0 1 1176,355 H684 A4,4 0 0 1 680,351 V269 A4,4 0 0 1 684,265 Z" />
  <circle cx="710" cy="293" r="5" fill="#F59E0B" />
  <text x="730" y="288" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">流体阻力</text>
  <text x="730" y="313" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">低雷诺数环境下，血液黏稠度如同厚重蜂蜜</text>
  <path fill="#1E1408" d="M684,370 H1176 A4,4 0 0 1 1180,374 V456 A4,4 0 0 1 1176,460 H684 A4,4 0 0 1 680,456 V374 A4,4 0 0 1 684,370 Z" />
  <circle cx="710" cy="398" r="5" fill="#F59E0B" />
  <text x="730" y="393" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">靶向识别</text>
  <text x="730" y="418" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">免疫系统清除、材料毒性、代谢难题未解</text>
  <path fill="#1E1408" d="M684,475 H1176 A4,4 0 0 1 1180,479 V561 A4,4 0 0 1 1176,565 H684 A4,4 0 0 1 680,561 V479 A4,4 0 0 1 684,475 Z" />
  <circle cx="710" cy="503" r="5" fill="#F59E0B" />
  <text x="730" y="498" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">通信反馈</text>
  <text x="730" y="523" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">无法安装天线或传感器，只能"半盲操"</text>
