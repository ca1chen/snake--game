<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0E17" />
  <rect x="0" y="0" width="1280" height="3" fill="#3B82F6" />
  <text x="60" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#FFFFFF">微纳技术三大发展阶段</text>
  <rect x="60" y="70" width="1160" height="1" fill="#1E293B" />

  
  <path fill="#131926" d="M66,90 H424 A6,6 0 0 1 430,96 V664 A6,6 0 0 1 424,670 H66 A6,6 0 0 1 60,664 V96 A6,6 0 0 1 66,90 Z" />
  <path fill="#1E3A5F" d="M66,90 H424 A6,6 0 0 1 430,96 V124 A6,6 0 0 1 424,130 H66 A6,6 0 0 1 60,124 V96 A6,6 0 0 1 66,90 Z" />
  <rect x="60" y="110" width="370" height="20" fill="#1E3A5F" />
  <text x="245" y="115" font-family="Microsoft YaHei" font-size="13" fill="#8899AA" text-anchor="middle">20世纪60-90年代初</text>
  <text x="90" y="165" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#3B82F6">理论萌芽与静态操控阶段</text>
  <circle cx="80" cy="210" r="4" fill="#3B82F6" />
  <text x="95" y="215" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">1959年费曼提出微观机械构想</text>
  <circle cx="80" cy="250" r="4" fill="#3B82F6" />
  <text x="95" y="255" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">开启微纳尺度工程研究先河</text>
  <circle cx="80" cy="290" r="4" fill="#3B82F6" />
  <text x="95" y="295" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">精密制造仅能完成微米级简易结构</text>
  <circle cx="80" cy="330" r="4" fill="#3B82F6" />
  <text x="95" y="335" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">工艺精度不足，依赖人工辅助</text>
  
  <image href="../images/image4.png" x="80" y="360" width="330" height="180" preserveAspectRatio="xMidYMid slice" />

  
  <path fill="#131926" d="M461,90 H819 A6,6 0 0 1 825,96 V664 A6,6 0 0 1 819,670 H461 A6,6 0 0 1 455,664 V96 A6,6 0 0 1 461,90 Z" />
  <path fill="#1E3A5F" d="M461,90 H819 A6,6 0 0 1 825,96 V124 A6,6 0 0 1 819,130 H461 A6,6 0 0 1 455,124 V96 A6,6 0 0 1 461,90 Z" />
  <rect x="455" y="110" width="370" height="20" fill="#1E3A5F" />
  <text x="640" y="115" font-family="Microsoft YaHei" font-size="13" fill="#8899AA" text-anchor="middle">20世纪90年代-21世纪初</text>
  <text x="485" y="165" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#3B82F6">结构成型与主动驱动阶段</text>
  <circle cx="475" cy="210" r="4" fill="#3B82F6" />
  <text x="490" y="215" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">高精度光刻、微蚀刻、激光微加工</text>
  <circle cx="475" cy="250" r="4" fill="#3B82F6" />
  <text x="490" y="255" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">柔性机构设计理念首次落地</text>
  <circle cx="475" cy="290" r="4" fill="#3B82F6" />
  <text x="490" y="295" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">规避刚性结构作业冲击问题</text>
  <circle cx="475" cy="330" r="4" fill="#3B82F6" />
  <text x="490" y="335" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">压电、静电驱动实现纳米级分辨率</text>
  <image href="../images/image10.png" x="475" y="360" width="330" height="180" preserveAspectRatio="xMidYMid slice" />

  
  <path fill="#131926" d="M856,90 H1214 A6,6 0 0 1 1220,96 V664 A6,6 0 0 1 1214,670 H856 A6,6 0 0 1 850,664 V96 A6,6 0 0 1 856,90 Z" />
  <path fill="#1E3A5F" d="M856,90 H1214 A6,6 0 0 1 1220,96 V124 A6,6 0 0 1 1214,130 H856 A6,6 0 0 1 850,124 V96 A6,6 0 0 1 856,90 Z" />
  <rect x="850" y="110" width="370" height="20" fill="#1E3A5F" />
  <text x="1035" y="115" font-family="Microsoft YaHei" font-size="13" fill="#8899AA" text-anchor="middle">21世纪10年代至今</text>
  <text x="880" y="165" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#3B82F6">智能融合与多功能集成阶段</text>
  <circle cx="870" cy="210" r="4" fill="#3B82F6" />
  <text x="885" y="215" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">微纳3D打印、异质材料一体化加工</text>
  <circle cx="870" cy="250" r="4" fill="#3B82F6" />
  <text x="885" y="255" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">机器视觉与智能算法融入</text>
  <circle cx="870" cy="290" r="4" fill="#3B82F6" />
  <text x="885" y="295" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">赋予机器人环境感知能力</text>
  <circle cx="870" cy="330" r="4" fill="#3B82F6" />
  <text x="885" y="335" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">石墨烯、智能水凝胶成核心赋能</text>
  <image href="../images/image20.png" x="870" y="360" width="330" height="180" preserveAspectRatio="xMidYMid slice" />

  <text x="1220" y="700" font-family="Microsoft YaHei" font-size="11" fill="#8899AA" text-anchor="end">4</text>
  <rect x="0" y="718" width="1280" height="2" fill="#3B82F6" opacity="0.4" />
</svg>