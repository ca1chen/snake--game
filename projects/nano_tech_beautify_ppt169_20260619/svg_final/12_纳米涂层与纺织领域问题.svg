<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0E17" />
  <rect x="0" y="0" width="1280" height="3" fill="#3B82F6" />
  <text x="60" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#FFFFFF">纳米涂层与纺织领域问题</text>
  <rect x="60" y="70" width="1160" height="1" fill="#1E293B" />

  
  <path fill="#131926" d="M66,90 H614 A6,6 0 0 1 620,96 V664 A6,6 0 0 1 614,670 H66 A6,6 0 0 1 60,664 V96 A6,6 0 0 1 66,90 Z" />
  <text x="340" y="130" font-family="Microsoft YaHei" font-size="19" font-weight="bold" fill="#3B82F6" text-anchor="middle">高性能纳米涂料（建材 / 船舶）</text>
  <path fill="#1E3A5F" d="M84,155 H576 A4,4 0 0 1 580,159 V251 A4,4 0 0 1 576,255 H84 A4,4 0 0 1 80,251 V159 A4,4 0 0 1 84,155 Z" />
  <circle cx="110" cy="185" r="5" fill="#F59E0B" />
  <text x="130" y="180" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">耐久性差</text>
  <text x="130" y="205" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">纳米涂层仅几十至几百纳米厚，物理强度先天不足</text>
  <path fill="#1E3A5F" d="M84,275 H576 A4,4 0 0 1 580,279 V371 A4,4 0 0 1 576,375 H84 A4,4 0 0 1 80,371 V279 A4,4 0 0 1 84,275 Z" />
  <circle cx="110" cy="305" r="5" fill="#F59E0B" />
  <text x="130" y="300" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">环境侵蚀</text>
  <text x="130" y="325" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">大风沙尘刮擦、酸雨腐蚀、紫外线照射迅速破坏微观结构</text>
  <path fill="#1E3A5F" d="M84,395 H576 A4,4 0 0 1 580,399 V491 A4,4 0 0 1 576,495 H84 A4,4 0 0 1 80,491 V399 A4,4 0 0 1 84,395 Z" />
  <circle cx="110" cy="425" r="5" fill="#F59E0B" />
  <text x="130" y="420" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">维护成本高</text>
  <text x="130" y="445" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">汽车纳米隐形车衣或玻璃自清洁涂层1-2年后局部失效</text>
  <image href="../images/image104.png" x="100" y="520" width="480" height="130" preserveAspectRatio="xMidYMid slice" />

  
  <path fill="#131926" d="M666,90 H1214 A6,6 0 0 1 1220,96 V664 A6,6 0 0 1 1214,670 H666 A6,6 0 0 1 660,664 V96 A6,6 0 0 1 666,90 Z" />
  <text x="940" y="130" font-family="Microsoft YaHei" font-size="19" font-weight="bold" fill="#3B82F6" text-anchor="middle">纺织服装业</text>
  <path fill="#1E3A5F" d="M684,155 H1176 A4,4 0 0 1 1180,159 V251 A4,4 0 0 1 1176,255 H684 A4,4 0 0 1 680,251 V159 A4,4 0 0 1 684,155 Z" />
  <circle cx="710" cy="185" r="5" fill="#F59E0B" />
  <text x="730" y="180" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">结合不牢</text>
  <text x="730" y="205" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">纳米颗粒"粘"在纤维表面而非长在内部</text>
  <path fill="#1E3A5F" d="M684,275 H1176 A4,4 0 0 1 1180,279 V371 A4,4 0 0 1 1176,375 H684 A4,4 0 0 1 680,371 V279 A4,4 0 0 1 684,275 Z" />
  <circle cx="710" cy="305" r="5" fill="#F59E0B" />
  <text x="730" y="300" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">洗涤流失</text>
  <text x="730" y="325" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">洗衣机搅拌和洗衣粉化学作用下大量脱落</text>
  <path fill="#1E1408" d="M684,395 H1176 A4,4 0 0 1 1180,399 V491 A4,4 0 0 1 1176,495 H684 A4,4 0 0 1 680,491 V399 A4,4 0 0 1 684,395 Z" />
  <circle cx="710" cy="425" r="5" fill="#F59E0B" />
  <text x="730" y="420" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">环境风险</text>
  <text x="730" y="445" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">纳米银进入污水系统，杀死有益细菌，破坏生态平衡</text>
  <path fill="#1E1408" d="M684,515 H1176 A4,4 0 0 1 1180,519 V611 A4,4 0 0 1 1176,615 H684 A4,4 0 0 1 680,611 V519 A4,4 0 0 1 684,515 Z" />
  <circle cx="710" cy="545" r="5" fill="#F59E0B" />
  <text x="730" y="540" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F59E0B">健康隐患</text>
  <text x="730" y="565" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">极微小纳米颗粒可能通过皮肤毛孔进入人体循环</text>

  <text x="1220" y="700" font-family="Microsoft YaHei" font-size="11" fill="#8899AA" text-anchor="end">12</text>
  <rect x="0" y="718" width="1280" height="2" fill="#3B82F6" opacity="0.4" />
</svg>