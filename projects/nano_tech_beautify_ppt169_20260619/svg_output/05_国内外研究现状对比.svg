<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0E17"/>
  <rect x="0" y="0" width="1280" height="3" fill="#3B82F6"/>
  <text x="60" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#FFFFFF">国内外研究现状对比</text>
  <rect x="60" y="70" width="1160" height="1" fill="#1E293B"/>

  <!-- Left: 国外研究优势 -->
  <rect x="60" y="90" width="550" height="380" rx="6" fill="#131926"/>
  <rect x="60" y="90" width="550" height="42" rx="6" fill="#1E3A5F"/>
  <rect x="60" y="112" width="550" height="20" fill="#1E3A5F"/>
  <text x="335" y="117" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#3B82F6" text-anchor="middle">国外研究优势</text>
  <circle cx="90" cy="160" r="5" fill="#3B82F6"/>
  <text x="110" y="155" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#FFFFFF">基础理论深厚</text>
  <text x="110" y="178" font-family="Microsoft YaHei" font-size="12" fill="#8899AA">率先建立微纳柔顺机构核心设计理论</text>
  <circle cx="90" cy="215" r="5" fill="#3B82F6"/>
  <text x="110" y="210" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#FFFFFF">原创技术密集</text>
  <text x="110" y="233" font-family="Microsoft YaHei" font-size="12" fill="#8899AA">伪刚体模型、拓扑优化等经典方法由欧美团队提出</text>
  <circle cx="90" cy="270" r="5" fill="#3B82F6"/>
  <text x="110" y="265" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#FFFFFF">核心器件领先</text>
  <text x="110" y="288" font-family="Microsoft YaHei" font-size="12" fill="#8899AA">高性能压电、磁致伸缩微驱动器件具备纳米级分辨率</text>
  <image href="../images/image26.png" x="100" y="310" width="480" height="140" preserveAspectRatio="xMidYMid slice"/>

  <!-- Right: 国内研究特色 -->
  <rect x="650" y="90" width="570" height="380" rx="6" fill="#131926"/>
  <rect x="650" y="90" width="570" height="42" rx="6" fill="#1E3A5F"/>
  <rect x="650" y="112" width="570" height="20" fill="#1E3A5F"/>
  <text x="935" y="117" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#3B82F6" text-anchor="middle">国内研究特色</text>
  <circle cx="680" cy="160" r="5" fill="#3B82F6"/>
  <text x="700" y="155" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#FFFFFF">工程化适配强</text>
  <text x="700" y="178" font-family="Microsoft YaHei" font-size="12" fill="#8899AA">突破微构件残余应力控制、批量加工一致性等行业难题</text>
  <circle cx="680" cy="215" r="5" fill="#3B82F6"/>
  <text x="700" y="210" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#FFFFFF">装备自研能力突出</text>
  <text x="700" y="233" font-family="Microsoft YaHei" font-size="12" fill="#8899AA">国产微纳加工装备实现纳米级表面精度控制</text>
  <circle cx="680" cy="270" r="5" fill="#3B82F6"/>
  <text x="700" y="265" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#FFFFFF">场景化应用迭代迅速</text>
  <text x="700" y="288" font-family="Microsoft YaHei" font-size="12" fill="#8899AA">智能控制、自主规划、多机协同等领域优势明显</text>
  <image href="../images/image36.png" x="690" y="310" width="500" height="140" preserveAspectRatio="xMidYMid slice"/>

  <!-- Bottom: 共性技术瓶颈 -->
  <rect x="60" y="495" width="1160" height="175" rx="6" fill="#1E1408"/>
  <rect x="60" y="495" width="1160" height="3" fill="#F59E0B"/>
  <text x="100" y="530" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#F59E0B">共性技术瓶颈</text>
  <text x="100" y="560" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">• 材料-结构-驱动协同设计体系不完善</text>
  <text x="100" y="590" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">• 柔性微机构承载能力与稳定性矛盾突出</text>
  <text x="100" y="620" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">• 纳米材料成型一致性、界面结合强度偏低</text>

  <text x="1220" y="700" font-family="Microsoft YaHei" font-size="11" fill="#8899AA" text-anchor="end">5</text>
  <rect x="0" y="718" width="1280" height="2" fill="#3B82F6" opacity="0.4"/>
</svg>
