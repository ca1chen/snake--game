<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0E17"/>
  <rect x="0" y="0" width="1280" height="3" fill="#3B82F6"/>
  <text x="60" y="55" font-family="Microsoft YaHei" font-size="26" font-weight="bold" fill="#FFFFFF">纳米材料技术应用</text>
  <rect x="60" y="70" width="1160" height="1" fill="#1E293B"/>

  <!-- Card 1: 多尺度建模仿真 -->
  <rect x="60" y="90" width="370" height="300" rx="6" fill="#131926"/>
  <text x="90" y="125" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#3B82F6">多尺度建模仿真</text>
  <image href="../images/image77.png" x="80" y="145" width="150" height="100" preserveAspectRatio="xMidYMid slice"/>
  <image href="../images/image79.png" x="240" y="145" width="170" height="100" preserveAspectRatio="xMidYMid slice"/>
  <text x="80" y="275" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">分子动力学仿真精准解析材料拉伸、</text>
  <text x="80" y="295" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">弯曲、界面脱粘等微观机理</text>
  <text x="80" y="325" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">从单一材料线弹性仿真迭代至多材料、</text>
  <text x="80" y="345" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">多场耦合多尺度仿真体系</text>

  <!-- Card 2: 四大应用体系 -->
  <rect x="455" y="90" width="370" height="300" rx="6" fill="#131926"/>
  <text x="485" y="125" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#3B82F6">四大应用体系</text>
  <rect x="485" y="145" width="155" height="45" rx="4" fill="#1E3A5F"/>
  <text x="562" y="173" font-family="Microsoft YaHei" font-size="13" fill="#FFFFFF" text-anchor="middle">结构增强</text>
  <rect x="650" y="145" width="155" height="45" rx="4" fill="#1E3A5F"/>
  <text x="727" y="173" font-family="Microsoft YaHei" font-size="13" fill="#FFFFFF" text-anchor="middle">功能驱动</text>
  <rect x="485" y="200" width="155" height="45" rx="4" fill="#1E3A5F"/>
  <text x="562" y="228" font-family="Microsoft YaHei" font-size="13" fill="#FFFFFF" text-anchor="middle">界面改性</text>
  <rect x="650" y="200" width="155" height="45" rx="4" fill="#1E3A5F"/>
  <text x="727" y="228" font-family="Microsoft YaHei" font-size="13" fill="#FFFFFF" text-anchor="middle">精准传感</text>
  <text x="485" y="285" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">提升柔性构件抗疲劳与形变稳定性</text>
  <text x="485" y="305" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">纳米压电、MXene驱动传感一体化</text>
  <text x="485" y="325" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">优化涂层工艺降低微尺度磨损</text>
  <text x="485" y="345" font-family="Microsoft YaHei" font-size="12" fill="#CCCCCC">实现驱动、感知、操作一体化</text>

  <!-- Card 3: 技术瓶颈 -->
  <rect x="850" y="90" width="370" height="300" rx="6" fill="#131926"/>
  <text x="880" y="125" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#F59E0B">技术瓶颈</text>
  <circle cx="880" cy="160" r="4" fill="#F59E0B"/>
  <text x="895" y="165" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">高端纳米薄膜制备工艺、复杂异形</text>
  <text x="895" y="185" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">结构成型精度不足</text>
  <circle cx="880" cy="215" r="4" fill="#F59E0B"/>
  <text x="895" y="220" font-family="Microsoft YaHei" font-size="13" fill="#CCCCCC">极端工况下材料性能衰减明显</text>

  <!-- Bottom: 国内外对比 -->
  <rect x="60" y="420" width="1160" height="250" rx="6" fill="#131926"/>
  <text x="90" y="460" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#3B82F6">国内外对比</text>
  <rect x="90" y="480" width="500" height="160" rx="4" fill="#1E3A5F"/>
  <text x="340" y="510" font-family="Microsoft YaHei" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">国外</text>
  <image href="../images/image89.png" x="110" y="525" width="220" height="95" preserveAspectRatio="xMidYMid slice"/>
  <image href="../images/image91.png" x="340" y="525" width="230" height="95" preserveAspectRatio="xMidYMid slice"/>
  <text x="340" y="630" font-family="Microsoft YaHei" font-size="12" fill="#8899AA" text-anchor="middle">高端定制化技术优势显著，极限性能领先</text>
  <rect x="650" y="480" width="550" height="160" rx="4" fill="#1E3A5F"/>
  <text x="925" y="510" font-family="Microsoft YaHei" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">国内</text>
  <image href="../images/image81.png" x="670" y="525" width="240" height="95" preserveAspectRatio="xMidYMid slice"/>
  <image href="../images/image83.png" x="930" y="525" width="240" height="95" preserveAspectRatio="xMidYMid slice"/>
  <text x="925" y="630" font-family="Microsoft YaHei" font-size="12" fill="#8899AA" text-anchor="middle">工程化、产业化落地优势突出，性价比高</text>

  <text x="1220" y="700" font-family="Microsoft YaHei" font-size="11" fill="#8899AA" text-anchor="end">9</text>
  <rect x="0" y="718" width="1280" height="2" fill="#3B82F6" opacity="0.4"/>
</svg>
