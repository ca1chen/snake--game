<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0A0E17"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#3B82F6"/>
  <!-- Title -->
  <text x="60" y="72" font-family="Microsoft YaHei" font-size="28" font-weight="bold" fill="#FFFFFF">目  录</text>
  <!-- 2x2 card grid -->
  <!-- Card 1: 01 -->
  <rect x="60" y="130" width="560" height="260" rx="8" fill="#131926" stroke="#1E293B" stroke-width="1"/>
  <text x="100" y="220" font-family="Arial" font-size="56" font-weight="bold" fill="#3B82F6">01</text>
  <rect x="100" y="250" width="60" height="3" rx="1" fill="#3B82F6"/>
  <text x="100" y="320" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#FFFFFF">研究背景与发展历程</text>
  <!-- Card 2: 02 -->
  <rect x="660" y="130" width="560" height="260" rx="8" fill="#131926" stroke="#1E293B" stroke-width="1"/>
  <text x="700" y="220" font-family="Arial" font-size="56" font-weight="bold" fill="#3B82F6">02</text>
  <rect x="700" y="250" width="60" height="3" rx="1" fill="#3B82F6"/>
  <text x="700" y="320" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#FFFFFF">微纳操作技术应用现状</text>
  <!-- Card 3: 03 -->
  <rect x="60" y="420" width="560" height="260" rx="8" fill="#131926" stroke="#1E293B" stroke-width="1"/>
  <text x="100" y="510" font-family="Arial" font-size="56" font-weight="bold" fill="#3B82F6">03</text>
  <rect x="100" y="540" width="60" height="3" rx="1" fill="#3B82F6"/>
  <text x="100" y="610" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#FFFFFF">当前面临的核心问题</text>
  <!-- Card 4: 04 -->
  <rect x="660" y="420" width="560" height="260" rx="8" fill="#131926" stroke="#1E293B" stroke-width="1"/>
  <text x="700" y="510" font-family="Arial" font-size="56" font-weight="bold" fill="#3B82F6">04</text>
  <rect x="700" y="540" width="60" height="3" rx="1" fill="#3B82F6"/>
  <text x="700" y="610" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#FFFFFF">未来展望与深度思考</text>
  <!-- Page number -->
  <text x="1220" y="700" font-family="Microsoft YaHei" font-size="11" fill="#8899AA" text-anchor="end">2</text>
  <rect x="0" y="718" width="1280" height="2" fill="#3B82F6" opacity="0.4"/>
</svg>
