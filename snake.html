<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    text-align: center;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .title {
    color: #e94560;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .score-box {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    padding: 8px 20px;
    color: #eee;
  }

  .score-label {
    font-size: 11px;
    color: #8899aa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-value {
    font-size: 26px;
    font-weight: 700;
    color: #e94560;
  }

  canvas {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(233, 69, 96, 0.15);
  }

  .hint {
    color: #556;
    font-size: 13px;
    margin-top: 14px;
    letter-spacing: 1px;
  }

  .game-over-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.55);
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  .game-over-overlay.active {
    display: flex;
  }

  .game-over-card {
    background: #16213e;
    border: 1px solid #e94560;
    border-radius: 16px;
    padding: 36px 48px;
    text-align: center;
  }

  .game-over-card h2 {
    color: #e94560;
    font-size: 32px;
    margin-bottom: 8px;
  }

  .game-over-card .final-score {
    color: #ccc;
    font-size: 18px;
    margin-bottom: 24px;
  }

  .game-over-card .final-score span {
    color: #e94560;
    font-weight: 700;
    font-size: 24px;
  }

  .btn {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 36px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.2s;
  }

  .btn:hover { background: #d63850; }
  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">🐍 贪吃蛇</div>
    <div class="score-box">
      <div class="score-label">得分</div>
      <div class="score-value" id="score">0</div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="hint">↑ ↓ ← → 或 WASD 控制方向 · 空格键暂停</div>
</div>

<div class="game-over-overlay" id="overlay">
  <div class="game-over-card">
    <h2>游戏结束</h2>
    <div class="final-score">最终得分 <span id="finalScore">0</span></div>
    <button class="btn" id="restartBtn">重新开始</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// --- 配置 ---
const GRID = 20;          // 每格像素
const COLS = 25;          // 列数
const ROWS = 25;          // 行数
const SPEED = 100;        // 帧间隔 ms

canvas.width  = COLS * GRID;
canvas.height = ROWS * GRID;

// --- 状态 ---
let snake = [];
let dir = { x: 1, y: 0 };
let nextDir = { x: 1, y: 0 };
let food = {};
let score = 0;
let running = false;
let paused = false;
let timer = null;

const scoreEl = document.getElementById('score');
const overlay = document.getElementById('overlay');
const finalScoreEl = document.getElementById('finalScore');
const restartBtn = document.getElementById('restartBtn');

// --- 初始化 ---
function init() {
  const mx = (COLS / 2) | 0;
  const my = (ROWS / 2) | 0;
  snake = [
    { x: mx,     y: my },
    { x: mx - 1, y: my },
    { x: mx - 2, y: my },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  paused = false;
  scoreEl.textContent = '0';
  overlay.classList.remove('active');
  spawnFood();
}

function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const free = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) free.push({ x, y });
    }
  }
  food = free[Math.floor(Math.random() * free.length)];
}

// --- 游戏循环 ---
function tick() {
  if (!running || paused) return;

  // 应用方向（防止反向）
  if (!(nextDir.x + dir.x === 0 && nextDir.y + dir.y === 0)) {
    dir = nextDir;
  }

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 撞墙检测
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }

  // 撞自己检测
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  // 吃食物
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

// --- 绘制 ---
function draw() {
  // 背景
  ctx.fillStyle = '#0f3460';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格线
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // 食物（脉动光晕）
  const fx = food.x * GRID + GRID / 2;
  const fy = food.y * GRID + GRID / 2;
  const pulse = 1 + 0.2 * Math.sin(Date.now() / 200);
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(fx, fy, (GRID / 2 - 2) * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(233,69,96,0.3)';
  ctx.beginPath();
  ctx.arc(fx, fy, (GRID / 2 + 2) * pulse, 0, Math.PI * 2);
  ctx.fill();

  // 蛇身
  snake.forEach((seg, i) => {
    const t = 1 - i / Math.max(snake.length - 1, 1);
    const r = Math.round(15 + t * 100);
    const g = Math.round(180 + t * 75);
    const b = Math.round(140 + t * 115);
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2, i === 0 ? 6 : 4);
    ctx.fill();

    // 蛇头眼睛
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const cx = seg.x * GRID + GRID / 2;
      const cy = seg.y * GRID + GRID / 2;
      const ex = dir.x * 3 + dir.y * 4;
      const ey = dir.y * 3 + dir.x * 4;
      ctx.beginPath();
      ctx.arc(cx + ex, cy - ey, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + ex, cy + ey, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(cx + ex + dir.x * 1.5, cy - ey + dir.y * 1.5, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + ex + dir.x * 1.5, cy + ey + dir.y * 1.5, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

// --- 控制 ---
function start() {
  if (running) return;
  init();
  running = true;
  timer = setInterval(tick, SPEED);
}

function gameOver() {
  running = false;
  clearInterval(timer);
  finalScoreEl.textContent = score;
  overlay.classList.add('active');
}

function togglePause() {
  if (!running) return;
  paused = !paused;
}

// --- 事件 ---
window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === ' ' || key === 'spacebar') {
    e.preventDefault();
    togglePause();
    return;
  }

  const map = {
    arrowup:    { x: 0, y: -1 },
    arrowdown:  { x: 0, y:  1 },
    arrowleft:  { x: -1, y: 0 },
    arrowright: { x: 1, y:  0 },
    w: { x: 0, y: -1 },
    s: { x: 0, y:  1 },
    a: { x: -1, y: 0 },
    d: { x: 1, y:  0 },
  };

  const d = map[key];
  if (d) {
    e.preventDefault();
    // 防止反向
    if (!(d.x + dir.x === 0 && d.y + dir.y === 0)) {
      nextDir = d;
    }
  }
});

restartBtn.addEventListener('click', () => {
  if (timer) clearInterval(timer);
  start();
});

// 触屏：简单滑动手势
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  const d = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 })
    : (dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
  if (!(d.x + dir.x === 0 && d.y + dir.y === 0)) nextDir = d;
});

// --- 启动 ---
init();
draw();
start();
</script>
</body>
</html>
